<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JARVIS</title><style>
body {
  margin: 0;
  background: #000;
  color: #00f7ff;
  font-family: Arial, sans-serif;
  text-align: center;
  overflow: hidden;
}

/* GRID BACKGROUND */
body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background:
    linear-gradient(#00f7ff22 1px, transparent 1px),
    linear-gradient(90deg, #00f7ff22 1px, transparent 1px);
  background-size: 40px 40px;
  z-index: -1;
}

/* ORB */
.orb {
  width: 160px;
  height: 160px;
  margin: 80px auto 20px;
  border-radius: 50%;
  background: radial-gradient(circle, #00f7ff, #0066ff);
  box-shadow: 0 0 40px #00f7ff;
  transition: 0.3s;
}

.orb.listening {
  box-shadow: 0 0 80px #00f7ff;
  transform: scale(1.1);
}

.orb.speaking {
  box-shadow: 0 0 80px #00ffcc;
  transform: scale(1.15);
}

/* PANEL */
.panel {
  margin: 20px auto;
  width: 80%;
  max-width: 300px;
  border: 1px solid #00f7ff;
  padding: 15px;
}

/* BUTTONS */
button {
  margin: 8px;
  padding: 10px 15px;
  background: transparent;
  border: 1px solid #00f7ff;
  color: #00f7ff;
}

button:hover {
  background: #00f7ff22;
}
</style></head><body><h2>J.A.R.V.I.S</h2><div class="orb" id="orb"></div><div class="panel" id="jarvisReply">
  J.A.R.V.I.S. INTERFACE<br>
  Listening...<br>
  Awaiting command.
</div><button onclick="testAPI()">🎤 Test API</button>

<div>
  <button id="focusBtn">🎯 Focus</button>
  <button id="calmBtn">🌊 Calm</button>
  <button id="emergencyBtn">🚨 Emergency</button>
</div><script>
/* =========================
   SPEECH SYNTHESIS
========================= */
function speak(text) {
  const speech = new SpeechSynthesisUtterance(text);

  speech.lang = "en-US";
  speech.rate = 0.95;
  speech.pitch = 0.9;

  setOrbState("speaking");

  // 🔴 STOP MIC while speaking
  recognition.stop();

  speech.onend = () => {
    setOrbState("idle");

    // 🟢 Restart listening after speaking
    startListening();
  };

  speechSynthesis.speak(speech);
}

/* =========================
   ORB STATE
========================= */
const orb = document.getElementById("orb");

function setOrbState(state) {
  orb.classList.remove("listening", "speaking");

  if (state === "listening") orb.classList.add("listening");
  if (state === "speaking") orb.classList.add("speaking");
}

/* =========================
   SPEECH RECOGNITION
========================= */
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const recognition = new SpeechRecognition();

recognition.continuous = true;
recognition.interimResults = false;

function startListening() {
  setOrbState("listening");
  try {
    recognition.start();
  } catch (e) {
    console.log("Already started");
  }
}

recognition.onresult = (event) => {
  const transcript = event.results[0][0].transcript.toLowerCase();
console.log("Heard:", transcript);

  if (transcript.includes("hey jarvis")) {

    const command = transcript.replace("hey jarvis", "").trim();

    if (command) {
      handleCommand(command); // ✅ run command FIRST
    } else {
      speak("Yes?"); // only respond if no command
    }

  } else {
    console.log("Ignored (no wake word)");
  }
};

// Restart only if not speaking
recognition.onend = () => {
  if (!speechSynthesis.speaking) {
    startListening();
  }
};

async function askJarvis(question){

  try {
    const res = await fetch("https://jarvis-server-0cga.onrender.com/ask", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ message: question })
    });

    const data = await res.json();

    console.log(data);

    speak(data.reply || "No response");

  } catch (err) {
    speak("Server not responding.");
    console.error(err);
  }

}

/* =========================
   COMMAND HANDLER
========================= */
function handleCommand(text) {
  if (text.includes("focus")) {
    speak("Focus protocol activated");
  }

  else if (text.includes("calm")) {
    speak("Calm protocol activated");
    startBreathing();
  }

  else if (text.includes("emergency")) {
    speak("Emergency protocol activated");
  }

  else {
    askJarvis(text);
  }
}

/* =========================
   BREATHING LOOP
========================= */
let breathingInterval;

function startBreathing() {
  clearInterval(breathingInterval);

  breathingInterval = setInterval(() => {
    speak("Breathe in");
    setTimeout(() => speak("Hold"), 4000);
    setTimeout(() => speak("Exhale"), 8000);
  }, 12000);
}

  async function testAPI() {
  try {
    const res = await fetch("https://jarvis-server-0cga.onrender.com/ask", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ message: "hello" })
    });

    const data = await res.json();

    alert("Response: " + data.reply);
    speak(data.reply);

  } catch (err) {
    alert("ERROR: " + err);
  }
  }

/* =========================
   BUTTONS
========================= */
document.getElementById("focusBtn").onclick = () => {
  speak("Focus protocol activated");
};

document.getElementById("calmBtn").onclick = () => {
  speak("Calm protocol activated");
  startBreathing();
};

document.getElementById("emergencyBtn").onclick = () => {
  speak("Emergency protocol activated");
};

  window.onload = () => {
  recognition.start();
};
</script></body>
  </html>
