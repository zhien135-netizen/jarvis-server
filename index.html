<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JARVIS</title><style>
body {
  margin: 0;
  background: #000;
  color: #00f7ff;
  font-family: Arial, sans-serif;
  text-align: center;
  overflow: hidden;
}

/* GRID BACKGROUND */
body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background:
    linear-gradient(#00f7ff22 1px, transparent 1px),
    linear-gradient(90deg, #00f7ff22 1px, transparent 1px);
  background-size: 40px 40px;
  z-index: -1;
}

/* ORB */
.orb {
  width: 160px;
  height: 160px;
  margin: 80px auto 20px;
  border-radius: 50%;
  background: radial-gradient(circle, #00f7ff, #0066ff);
  box-shadow: 0 0 40px #00f7ff;
  transition: 0.3s;
}

.orb.listening {
  box-shadow: 0 0 80px #00f7ff;
  transform: scale(1.1);
}

.orb.speaking {
  box-shadow: 0 0 80px #00ffcc;
  transform: scale(1.15);
}

/* PANEL */
.panel {
  margin: 20px auto;
  width: 80%;
  max-width: 300px;
  border: 1px solid #00f7ff;
  padding: 15px;
}

/* BUTTONS */
button {
  margin: 8px;
  padding: 10px 15px;
  background: transparent;
  border: 1px solid #00f7ff;
  color: #00f7ff;
}

button:hover {
  background: #00f7ff22;
}
</style></head><body><h2>J.A.R.V.I.S</h2><div class="orb" id="orb"></div><div class="panel" id="jarvisReply">
  J.A.R.V.I.S. INTERFACE<br>
  Listening...<br>
  Awaiting command.
</div><button onclick="startListening()">🎤 Talk</button>

<div>
  <button id="focusBtn">🎯 Focus</button>
  <button id="calmBtn">🌊 Calm</button>
  <button id="emergencyBtn">🚨 Emergency</button>
</div><script>
/* =========================
   SPEECH SYNTHESIS
========================= */
function speak(text) {
  const speech = new SpeechSynthesisUtterance(text);

  speech.lang = "en-US";
  speech.rate = 0.95;
  speech.pitch = 0.9;

  setOrbState("speaking");

  speech.onend = () => {
    setOrbState("idle");
  };

  speechSynthesis.speak(speech);
}

/* =========================
   ORB STATE
========================= */
const orb = document.getElementById("orb");

function setOrbState(state) {
  orb.classList.remove("listening", "speaking");

  if (state === "listening") orb.classList.add("listening");
  if (state === "speaking") orb.classList.add("speaking");
}

/* =========================
   SPEECH RECOGNITION
========================= */
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const recognition = new SpeechRecognition();

recognition.continuous = false;
recognition.interimResults = false;

function startListening() {
  setOrbState("listening");
  recognition.start();
}

recognition.onresult = (event) => {
  const text = event.results[0][0].transcript.toLowerCase();
  handleCommand(text);
};

recognition.onend = () => {
  setOrbState("idle");
};

/* =========================
   COMMAND HANDLER
========================= */
function handleCommand(text) {
  if (text.includes("focus")) {
    speak("Focus protocol activated");
  }

  else if (text.includes("calm")) {
    speak("Calm protocol activated");
    startBreathing();
  }

  else if (text.includes("emergency")) {
    speak("Emergency protocol activated");
  }

  else {
    speak("Command not recognized");
  }
}

/* =========================
   BREATHING LOOP
========================= */
let breathingInterval;

function startBreathing() {
  clearInterval(breathingInterval);

  breathingInterval = setInterval(() => {
    speak("Breathe in");
    setTimeout(() => speak("Hold"), 4000);
    setTimeout(() => speak("Exhale"), 8000);
  }, 12000);
}

/* =========================
   BUTTONS
========================= */
document.getElementById("focusBtn").onclick = () => {
  speak("Focus protocol activated");
};

document.getElementById("calmBtn").onclick = () => {
  speak("Calm protocol activated");
  startBreathing();
};

document.getElementById("emergencyBtn").onclick = () => {
  speak("Emergency protocol activated");
};
</script></body>
  </html>
